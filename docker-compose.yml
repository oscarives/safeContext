# SafeContext — Docker Compose stack (development)
# Services: api, worker, ui, postgres, redis, minio, otel, prometheus, grafana, nginx, keycloak, vault (12 total)
# Run: docker compose up
# Prerequisites: Run apps/infra/compose/generate-certs.sh before first start.
#
# Air-gapped / Harbor registry overlay:
#   docker compose -f docker-compose.yml -f apps/infra/compose/harbor/docker-compose.harbor.yml up
# Sync images to Harbor (once, with internet):
#   ./apps/infra/scripts/sync-images.sh
# Generate offline bundle:
#   ./apps/infra/scripts/bundle.sh <version>

x-common: &common
  restart: unless-stopped
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  # ── PostgreSQL 15 with pgAudit ───────────────────────────────────────────────
  postgres:
    <<: *common
    image: postgres:15.6-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/infra/compose/postgres/init-pgaudit.sql:/docker-entrypoint-initdb.d/01-init-pgaudit.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend

  # ── Redis 7 (broker + cache) ─────────────────────────────────────────────────
  redis:
    <<: *common
    image: redis:7.2.4-alpine
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - backend

  # ── MinIO Community Edition (object storage, S3-compatible) ─────────────────
  minio:
    <<: *common
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - backend

  # ── MinIO Initialization (one-shot: WORM, SSE, versioning, retention) ────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./apps/infra/compose/minio-init.sh:/minio-init.sh:ro
    environment:
      MINIO_URL: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET_ARTIFACTS: ${MINIO_BUCKET_ARTIFACTS:-safecontext-artifacts}
    entrypoint: ["/bin/sh", "/minio-init.sh"]
    restart: "no"
    networks:
      - backend

  # ── Keycloak (SSO/MFA Identity Provider) ────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.3
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-safecontext}
      KC_DB_USERNAME: ${POSTGRES_USER:-safecontext_app}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    command: ["start-dev", "--import-realm"]
    volumes:
      - ./apps/infra/compose/keycloak/realm-safecontext.json:/opt/keycloak/data/import/realm-safecontext.json:ro
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # Keycloak 24 dev mode: verify TCP port is open (no curl/wget available)
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 2>/dev/null && echo ok || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    restart: unless-stopped
    networks:
      - backend
      - frontend

  # ── HashiCorp Vault (KMS — transit engine for MinIO SSE) ─────────────────────
  vault:
    image: hashicorp/vault:1.16.2
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_TOKEN:-safecontext-dev-token}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    ports:
      - "8200:8200"
    healthcheck:
      # vault status exits 2 when sealed (normal in dev) — check HTTP instead
      test: ["CMD-SHELL", "VAULT_ADDR=http://127.0.0.1:8200 vault status 2>&1 | grep -q 'Initialized'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - backend

  # ── FastAPI + MCP Server ─────────────────────────────────────────────────────
  # ── OPA Policy Engine ────────────────────────────────────────────────────────
  opa:
    image: openpolicyagent/opa:0.63.0
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-level=info"
      - "--ignore=*_test.rego"
      - "/policies"
    volumes:
      - ./apps/policies:/policies:ro
    ports:
      - "8181:8181"
    healthcheck:
      test: ["CMD", "/opa", "eval", "--data", "/policies", "data.safecontext.policy.policy_version"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - backend

  api:
    <<: *common
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      target: runtime
    image: safecontext/api:dev
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Redis
      REDIS_URL: ${REDIS_URL}
      BROKER_ADAPTER: ${BROKER_ADAPTER}
      CACHE_ADAPTER: ${CACHE_ADAPTER}
      # MinIO / Storage
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET_ARTIFACTS: ${MINIO_BUCKET_ARTIFACTS}
      MINIO_USE_SSL: ${MINIO_USE_SSL}
      STORAGE_ADAPTER: ${STORAGE_ADAPTER}
      # OPA
      OPA_URL: ${OPA_URL}
      OPA_POLICY_PATH: ${OPA_POLICY_PATH}
      # API config
      API_HOST: ${API_HOST}
      API_PORT: ${API_PORT}
      API_SECRET_KEY: ${API_SECRET_KEY}
      API_DEBUG: ${API_DEBUG}
      # MCP
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN}
      MCP_RATE_LIMIT_RPM: ${MCP_RATE_LIMIT_RPM:-100}
      # OIDC / Keycloak
      KEYCLOAK_URL: ${KEYCLOAK_URL:-http://keycloak:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-safecontext}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-safecontext-api}
      # Vault KMS
      VAULT_ADDR: ${VAULT_ADDR:-http://vault:8200}
      VAULT_DEV_TOKEN: ${VAULT_DEV_TOKEN:-safecontext-dev-token}
      # OpenTelemetry
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      opa:
        condition: service_healthy
      # keycloak and vault are optional in dev — enable when F4 auth is needed
      # keycloak:
      #   condition: service_healthy
      # vault:
      #   condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend
      - frontend

  # ── Dramatiq Workers ─────────────────────────────────────────────────────────
  worker:
    <<: *common
    build:
      context: .
      dockerfile: apps/workers/Dockerfile
      target: runtime
    image: safecontext/worker:dev
    environment:
      # Database
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Redis
      REDIS_URL: ${REDIS_URL}
      BROKER_ADAPTER: ${BROKER_ADAPTER}
      # MinIO / Storage
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET_ARTIFACTS: ${MINIO_BUCKET_ARTIFACTS}
      MINIO_USE_SSL: ${MINIO_USE_SSL}
      STORAGE_ADAPTER: ${STORAGE_ADAPTER}
      # OPA
      OPA_URL: ${OPA_URL}
      OPA_POLICY_PATH: ${OPA_POLICY_PATH}
      # Worker config
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY}
      WORKER_MAX_RETRIES: ${WORKER_MAX_RETRIES}
      # Detectors
      DETECTOR_CONFIDENCE_THRESHOLD: ${DETECTOR_CONFIDENCE_THRESHOLD}
      # OpenTelemetry
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      OTEL_SERVICE_NAME: safecontext-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import sys; sys.exit(0)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - backend

  # ── Next.js UI ───────────────────────────────────────────────────────────────
  ui:
    <<: *common
    build:
      context: ./apps/ui
      dockerfile: Dockerfile
      target: runtime
    image: safecontext/ui:dev
    environment:
      NODE_ENV: production
      # Bind Next.js standalone server to all interfaces (needed for healthcheck)
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      # Keycloak OIDC (public vars exposed to browser)
      NEXT_PUBLIC_KEYCLOAK_URL: ${NEXT_PUBLIC_KEYCLOAK_URL:-http://localhost:8080}
      NEXT_PUBLIC_KEYCLOAK_REALM: ${NEXT_PUBLIC_KEYCLOAK_REALM:-safecontext}
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: ${NEXT_PUBLIC_KEYCLOAK_CLIENT_ID:-safecontext-ui}
      # Redis-backed Next.js custom cache handler for multi-instance consistency (ADR-011)
      REDIS_URL: ${REDIS_URL}
      CACHE_ADAPTER: ${CACHE_ADAPTER}
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 > /dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 15s
      retries: 5
      start_period: 60s
    networks:
      - frontend
      - backend   # needed to reach Redis (custom cache handler) and API

  # ── OpenTelemetry Collector ──────────────────────────────────────────────────
  otel:
    <<: *common
    image: otel/opentelemetry-collector-contrib:0.96.0
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./apps/infra/compose/otel-collector.yaml:/etc/otel-collector.yaml:ro
    ports:
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
      - "8888:8888"    # OTel collector self-metrics
      - "8889:8889"    # Prometheus exporter (app metrics forwarded by OTel)
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - backend
      - observability

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    <<: *common
    image: prom/prometheus:v2.50.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    volumes:
      - ./apps/infra/compose/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./apps/infra/compose/prometheus-alerts.yml:/etc/prometheus/alerts/alerts.yml:ro
      - ./apps/infra/compose/prometheus-slo-rules.yml:/etc/prometheus/alerts/slo-rules.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      otel:
        condition: service_healthy
    networks:
      - observability
      - backend    # needed to scrape api:8000 and worker:9090

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    <<: *common
    image: grafana/grafana:10.3.3
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${API_SECRET_KEY}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_DOMAIN: localhost
      GF_SERVER_ROOT_URL: "https://localhost/grafana"
    volumes:
      - ./apps/infra/compose/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - observability

  # ── PostgreSQL daily backup (pg_basebackup + WAL streaming) ─────────────────
  pg-backup:
    image: postgres:15.6-alpine
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/infra/compose/postgres/pg-backup.sh:/pg-backup.sh:ro
      - pg_backups:/backups/postgres
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-safecontext_app}
      POSTGRES_DB: ${POSTGRES_DB:-safecontext}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_DIR: /backups/postgres
    entrypoint: ["/bin/sh", "-c", "while true; do /pg-backup.sh; sleep 86400; done"]
    restart: unless-stopped
    networks:
      - backend

  # ── nginx reverse proxy (TLS self-signed) ────────────────────────────────────
  nginx:
    <<: *common
    image: nginx:1.25.4-alpine
    volumes:
      - ./apps/infra/compose/nginx-dev.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8088:80"    # 80 requires admin on Windows; use localhost:8088 in dev
    depends_on:
      - api
      - ui
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - frontend

# ── Named volumes ──────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  pg_backups:
    driver: local
  # harbor_data is declared in apps/infra/compose/harbor/docker-compose.harbor.yml
  # and only created when the Harbor overlay is active.

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
  observability:
    driver: bridge

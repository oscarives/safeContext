# SafeContext — Prometheus scrape configuration

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s
  # Prometheus v3: scrape_protocols defines the Accept header order sent to targets.
  # Default already includes PrometheusText0.0.4 — explicit here for clarity.
  # NOTE: fallback_scrape_protocol is per-job only (not valid in global).
  scrape_protocols:
    - OpenMetricsText1.0.0
    - OpenMetricsText0.0.1
    - PrometheusText0.0.4
  external_labels:
    project: safecontext
    environment: development

rule_files:
  - /etc/prometheus/alerts/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: []  # alertmanager opcional en F2; añadir en F4

scrape_configs:
  # FastAPI metrics endpoint
  - job_name: safecontext-api
    static_configs:
      - targets: ['api:8000']
        labels:
          service: api
    metrics_path: /metrics/    # trailing slash required (FastAPI ASGI mount)
    scheme: http

  # Dramatiq worker metrics endpoint
  - job_name: safecontext-worker
    static_configs:
      - targets: ['worker:9090']    # worker exposes metrics on 9090
        labels:
          service: worker
    metrics_path: /metrics
    scheme: http

  # OpenTelemetry Collector self-metrics
  - job_name: otel-collector
    static_configs:
      - targets: ['otel:8888']
        labels:
          service: otel-collector
    metrics_path: /metrics

  # OpenTelemetry Collector Prometheus exporter (app metrics forwarded by OTel)
  - job_name: otel-app-metrics
    static_configs:
      - targets: ['otel:8889']
        labels:
          service: otel-app-metrics
    metrics_path: /metrics

  # Prometheus self-scrape
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: prometheus

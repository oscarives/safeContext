# Default deny-all: no pod can communicate unless explicitly allowed by
# a separate NetworkPolicy resource. This is the foundation of a
# zero-trust network posture for the safecontext namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
spec:
  podSelector: {}    # applies to ALL pods in namespace
  policyTypes:
    - Ingress
    - Egress

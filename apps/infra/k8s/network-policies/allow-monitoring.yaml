apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring
spec:
  podSelector:
    matchLabels:
      app: prometheus
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow Grafana to query Prometheus
    - from:
        - podSelector:
            matchLabels:
              app: grafana
      ports:
        - port: 9090
  egress:
    # Scrape all annotated pods in namespace on known metrics ports
    - to:
        - podSelector: {}
      ports:
        - port: 8000   # api metrics
        - port: 9191   # worker metrics
        - port: 8888   # otel collector self-metrics
        - port: 8889   # otel prometheus exporter
        - port: 9090   # prometheus self-scrape
    # DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# Allow Grafana to reach Prometheus
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-grafana
spec:
  podSelector:
    matchLabels:
      app: grafana
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow ingress controller to serve Grafana dashboards
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 3000
  egress:
    # Query Prometheus
    - to:
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - port: 9090
    # DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

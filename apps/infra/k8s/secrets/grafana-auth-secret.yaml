# Grafana basic-auth secret for nginx ingress controller.
# Generate the htpasswd data with:
#   htpasswd -c auth admin
#   kubectl create secret generic grafana-basic-auth --from-file=auth -n safecontext --dry-run=client -o yaml
#
# Replace the placeholder below with the real base64-encoded htpasswd content.
apiVersion: v1
kind: Secret
metadata:
  name: grafana-basic-auth
type: Opaque
data:
  # Placeholder — replace with real htpasswd output (base64-encoded)
  # Example: echo -n 'admin:$apr1$xyz...' | base64
  auth: CHANGEME_BASE64_ENCODED_HTPASSWD

# SafeContext — Grafana datasource provisioning
# Automatically configures Prometheus as a datasource on startup.

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: safecontext-prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      httpMethod: POST
      timeInterval: "15s"
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: safecontext-tempo

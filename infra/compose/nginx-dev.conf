# SafeContext — nginx dev config (HTTP only, no TLS required)
# For production use nginx.conf with TLS certs

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    upstream api_backend  { server api:8000; }
    upstream ui_backend   { server ui:3000; }

    server {
        listen 80;
        server_name _;

        # API
        location /api/ {
            proxy_pass         http://api_backend/v1/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # MCP
        location /v1/mcp/ {
            proxy_pass         http://api_backend/v1/mcp/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }

        # OpenAPI docs
        location /docs {
            proxy_pass http://api_backend/docs;
            proxy_set_header Host $host;
        }

        # Health (direct to API)
        location /health {
            proxy_pass http://api_backend/health;
            proxy_set_header Host $host;
        }

        # UI (everything else)
        location / {
            proxy_pass         http://ui_backend;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "keep-alive";
        }
    }
}

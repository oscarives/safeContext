# SafeContext — Prometheus scrape configuration

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s
  external_labels:
    project: safecontext
    environment: development

scrape_configs:
  # FastAPI metrics endpoint
  - job_name: safecontext-api
    static_configs:
      - targets: ['api:8000']
        labels:
          service: api
    metrics_path: /metrics
    scheme: http

  # Dramatiq worker metrics endpoint
  - job_name: safecontext-worker
    static_configs:
      - targets: ['worker:9191']
        labels:
          service: worker
    metrics_path: /metrics
    scheme: http

  # OpenTelemetry Collector self-metrics
  - job_name: otel-collector
    static_configs:
      - targets: ['otel:8888']
        labels:
          service: otel-collector
    metrics_path: /metrics

  # OpenTelemetry Collector Prometheus exporter (app metrics forwarded by OTel)
  - job_name: otel-app-metrics
    static_configs:
      - targets: ['otel:8889']
        labels:
          service: otel-app-metrics
    metrics_path: /metrics

  # Prometheus self-scrape
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: prometheus

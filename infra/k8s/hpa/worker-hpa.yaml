apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: worker-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: worker
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    # Scale based on DLQ depth exposed via Prometheus adapter
    # Requires kube-prometheus-stack + prometheus-adapter configured with
    # the safecontext_dlq_depth metric from otel/prometheus exporter.
    - type: External
      external:
        metric:
          name: safecontext_dlq_depth
          selector:
            matchLabels:
              app: safecontext
        target:
          type: AverageValue
          averageValue: "0"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-worker
spec:
  podSelector:
    matchLabels:
      app: worker
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow Prometheus to scrape metrics from workers
    - from:
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - port: 9191
  egress:
    # PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - port: 5432
    # Redis (message broker + cache)
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379
    # MinIO S3 API (artifact storage)
    - to:
        - podSelector:
            matchLabels:
              app: minio
      ports:
        - port: 9000
    # OpenTelemetry Collector (gRPC)
    - to:
        - podSelector:
            matchLabels:
              app: otel
      ports:
        - port: 4317
    # OPA sidecar or in-cluster service
    - ports:
        - port: 8181
    # DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

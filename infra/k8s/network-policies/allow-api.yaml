apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api
spec:
  podSelector:
    matchLabels:
      app: api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from nginx ingress controller namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 8000
    # Allow traffic from nginx pod if co-located in same namespace
    - from:
        - podSelector:
            matchLabels:
              app: nginx
      ports:
        - port: 8000
    # Allow Prometheus to scrape metrics
    - from:
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - port: 8000
  egress:
    # PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - port: 5432
    # Redis
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379
    # MinIO S3 API
    - to:
        - podSelector:
            matchLabels:
              app: minio
      ports:
        - port: 9000
    # OpenTelemetry Collector (gRPC)
    - to:
        - podSelector:
            matchLabels:
              app: otel
      ports:
        - port: 4317
    # OPA sidecar or in-cluster service
    - ports:
        - port: 8181
    # DNS resolution
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

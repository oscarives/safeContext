name: Build, Sign & Attest

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write        # OIDC para Cosign keyless signing
  packages: write        # Push a GitHub Container Registry
  attestations: write    # SLSA provenance

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/safecontext

jobs:
  build-sign:
    name: Build, scan, sign and attest
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [api, worker, ui]
        include:
          - component: api
            context: ./apps/api
            dockerfile: ./apps/api/Dockerfile
          - component: worker
            context: ./workers
            dockerfile: ./workers/Dockerfile
          - component: ui
            context: ./apps/ui
            dockerfile: ./apps/ui/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry (OIDC — no static secrets)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Vulnerability scan BEFORE build ──────────────────────────────────
      - name: Scan filesystem for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ${{ matrix.context }}
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true          # solo fallar en CVEs con fix disponible
          trivyignore-file: .trivyignore
          format: sarif
          output: trivy-${{ matrix.component }}.sarif

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.component }}.sarif

      # ── Generate SBOM ─────────────────────────────────────────────────────
      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Generate SBOM (SPDX-JSON)
        run: |
          syft packages ${{ matrix.context }} \
            -o spdx-json=sbom-${{ matrix.component }}.spdx.json
          echo "SBOM generated: sbom-${{ matrix.component }}.spdx.json"

      # ── Build image ───────────────────────────────────────────────────────
      - name: Build and push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.component }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.component }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Scan built image ──────────────────────────────────────────────────
      - name: Scan built image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.component }}:${{ github.sha }}
          severity: CRITICAL
          exit-code: 1
          ignore-unfixed: true
          trivyignore-file: .trivyignore

      # ── Sign image with Cosign (keyless via OIDC) ─────────────────────────
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.component }}@${{ steps.build.outputs.digest }}

      # ── Attach SBOM as attestation ────────────────────────────────────────
      - name: Attach SBOM attestation
        run: |
          cosign attest --yes \
            --predicate sbom-${{ matrix.component }}.spdx.json \
            --type spdxjson \
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.component }}@${{ steps.build.outputs.digest }}

      # ── SLSA provenance ───────────────────────────────────────────────────
      - name: Generate SLSA provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.component }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.component }}
          path: sbom-${{ matrix.component }}.spdx.json
          retention-days: 90

name: CI (Self-Hosted / Air-Gapped)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Runs on self-hosted runners with no internet access
# All images pulled from Harbor local registry
jobs:
  ci-airgapped:
    runs-on: [self-hosted, linux, safecontext]
    container:
      image: ${{ vars.HARBOR_HOST }}/library/python:3.12-slim
      credentials:
        username: ${{ vars.HARBOR_USER }}
        password: ${{ secrets.HARBOR_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (from local PyPI mirror or pre-installed)
        run: |
          pip install --no-index --find-links /opt/packages \
            pytest pytest-asyncio httpx pydantic fastapi sqlalchemy \
            structlog opentelemetry-api 2>/dev/null || \
          pip install pytest pytest-asyncio httpx pydantic fastapi sqlalchemy structlog opentelemetry-api

      - name: Run API tests
        run: pytest apps/api/tests/ -v --tb=short
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost/test

      - name: Run OPA tests (OPA binary pre-installed on runner)
        run: |
          if command -v opa &>/dev/null; then
            opa test apps/policies/ -v
          else
            echo "OPA not available on runner — install at: /usr/local/bin/opa"
          fi

      - name: Build images (from local Harbor base images)
        run: |
          docker build -t ${{ vars.HARBOR_HOST }}/safecontext/safecontext-api:${{ github.sha }} \
            --build-arg BASE_REGISTRY=${{ vars.HARBOR_HOST }} \
            ./apps/api/

      - name: Push to Harbor
        run: |
          docker push ${{ vars.HARBOR_HOST }}/safecontext/safecontext-api:${{ github.sha }}

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write      # OIDC — requerido para autenticación sin secretos estáticos
  pull-requests: write # Para comentarios de SafeContext en PRs

jobs:
  detect-secrets:
    name: Secret scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install detect-secrets
        run: pip install detect-secrets
      - name: Scan for secrets
        # Crea baseline si no existe, luego verifica que no hay secretos nuevos
        run: |
          if [ ! -f .secrets.baseline ]; then
            detect-secrets scan > .secrets.baseline
          fi
          detect-secrets audit .secrets.baseline --only-allowlisted || true
          detect-secrets scan --baseline .secrets.baseline

  lint-python:
    name: Python lint & types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install ruff and mypy
        run: pip install ruff mypy pydantic
      - name: Ruff lint
        run: ruff check apps/
      - name: Ruff format check
        run: ruff format --check apps/

  test-api:
    name: API tests (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.14"]
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install -r apps/api/requirements.txt
          pip install pytest pytest-asyncio
      - name: Run Alembic migrations
        run: |
          cd apps/api
          alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost/test
      - name: Run tests
        run: pytest apps/api/tests/ -v --tb=short
        env:
          PYTHONPATH: apps/api
          DATABASE_URL: postgresql+asyncpg://test:test@localhost/test
          REDIS_URL: redis://localhost:6379/0
          MCP_AUTH_TOKEN: test-token
          API_SECRET_KEY: test-secret-key-for-ci-only
          OPA_URL: http://localhost:8181
          SAFECONTEXT_ENV: dev

  test-ui:
    name: Frontend unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/ui/package-lock.json
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: apps/ui
      - name: Run Jest tests
        run: npx jest --no-coverage --ci
        working-directory: apps/ui

  test-e2e:
    name: Playwright E2E tests
    runs-on: ubuntu-latest
    # E2E requires the full stack running — only on main branch pushes
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/ui/package-lock.json
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: apps/ui
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/ui
      - name: Start stack via Docker Compose
        run: docker compose --profile auth up -d --wait
        timeout-minutes: 5
      - name: Wait for API readiness
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/api/v1/health > /dev/null 2>&1; then
              echo "API is ready"
              exit 0
            fi
            sleep 2
          done
          echo "API did not become ready in time"
          exit 1
      - name: Run Playwright tests
        run: npx playwright test
        working-directory: apps/ui
        env:
          E2E_BASE_URL: http://localhost:3000
          E2E_USER: testuser
          E2E_PASSWORD: testpassword
      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/ui/playwright-report/
          retention-days: 7
      - name: Stop stack
        if: always()
        run: docker compose --profile auth down -v

  test-opa:
    name: OPA policy tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: latest
      - name: Run OPA tests
        run: opa test apps/policies/ -v --coverage
      - name: Verify coverage >= 80%
        run: |
          COVERAGE=$(opa test apps/policies/ --coverage --format json 2>/dev/null | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          files = data.get('coverage', {}).get('files', {})
          covered = sum(len(f.get('covered', [])) for f in files.values())
          not_covered = sum(len(f.get('not_covered', [])) for f in files.values())
          total = covered + not_covered
          pct = covered / max(total, 1) * 100
          print(f'{pct:.1f}')
          ")
          echo "OPA coverage: ${COVERAGE}%"
          python3 -c "
          pct = float('${COVERAGE}')
          if pct < 80:
              print(f'FAIL: coverage {pct:.1f}% < 80%')
              exit(1)
          print(f'PASS: coverage {pct:.1f}%')
          "

  test-recall:
    name: ML recall gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install worker dependencies
        run: pip install -r apps/workers/requirements.txt
        working-directory: ${{ github.workspace }}
      - name: Download spaCy model
        run: python -m spacy download en_core_web_lg
      - name: Run recall evaluation
        run: pytest apps/workers/tests/ml/test_recall.py -v --tb=short
        env:
          PYTHONPATH: ${{ github.workspace }}/apps/workers:${{ github.workspace }}/apps/api
      - name: Assert recall thresholds
        if: always()
        run: echo "Recall gate complete — check test output above"

  safecontext-gate:
    name: SafeContext security gate
    runs-on: ubuntu-latest
    needs: [detect-secrets]
    # Solo corre si SAFECONTEXT_API_URL está configurada en el repo
    # (requiere instancia desplegada — no aplica en desarrollo)
    if: ${{ vars.SAFECONTEXT_API_URL != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: SafeContext scan
        uses: ./apps/infra/github-action
        with:
          api-url: ${{ vars.SAFECONTEXT_API_URL }}
          token: ${{ secrets.SAFECONTEXT_TOKEN }}
          document-path: "."
          policy-name: "base"
          fail-on-severity: "critical"
          post-comment: "true"
